include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    todo: ignore
    fixme: ignore

linter:
  rules:
    - avoid_print
    - prefer_final_locals
    - prefer_single_quotes
    - unawaited_futures
    - directives_ordering
