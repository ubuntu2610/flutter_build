# flutter_build 远程部署配置示例
#
# 复制为 config.yaml 并填入真实值。config.yaml 已被 .gitignore 忽略，不会提交；
# 本示例文件会随仓库提交，供他人参考。
#
# 作用：每次 `flutter_build windows` 构建成功后，可自动把产物 bundle 通过 scp
# 拷到远程 Windows 机器，便于在 Windows 上直接运行测试。
#
# 说明：这里用 scp（SSH→Windows 目录拷贝的标准方式，可处理大文件）。密码登录
# 需要本机安装 sshpass（sudo apt install sshpass）；也可留空 password 改用 SSH 密钥。

# 远程主机 IP 或域名（host 与 ip 二选一，等价）
host: 100.65.70.35

# SSH 登录名
username: ubuntu

# SSH 密码。留空则改用 SSH 密钥认证（不经 sshpass）
password: your-password-here

# SSH 端口（可选，默认 22）
port: 22

# 构建成功后是否自动拷贝。true 则每次构建成功自动 scp；
# 命令行 --copy / --no-copy 会覆盖此项
auto_copy: true

# 远程镜像根目录（Windows 路径，正/反斜杠均可）。
# 产物会拷到 remote_dir + （本地产物相对 config.yaml 所在目录的路径），
# 从而在远程镜像出与本地一致的目录结构。例如本地仓库根为
# /home/you/project/flutter_build、remote_dir 为 C:/project/flutter_build，
# 则 example 的产物 build/win_cross/release/hello 会落在：
#   C:/project/flutter_build/example/build/win_cross/release/hello
remote_dir: C:/project/flutter_build
